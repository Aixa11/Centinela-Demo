# render.yaml - Configuración para Render Blueprint

services:
  # ============================================
  # SERVICIO 1: BACKEND (API) 
  # ============================================
  - type: web
    name: centinela-backend
    runtime: python
    plan: free                         
    healthCheckPath: /
    buildCommand: |
      cd backend
      pip install -r requirements.txt
    startCommand: uvicorn backend.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0

  # ============================================
  # SERVICIO 2: FRONTEND (Dashboard) 
  # ============================================
  - type: web
    name: centinela-frontend
    runtime: static
    plan: free                        
    buildCommand: |
      cd frontend
      # Sin pasos de build para HTML estático
    staticPublishPath: ./frontend
    envVars:
      - key: API_URL
        value: https://centinela-backend.onrender.com
