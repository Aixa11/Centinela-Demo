# render.yaml - Versión con frontend gratuito y backend en otro servicio
services:
  # ============================================
  # SERVICIO 1: BACKEND (API) - Requiere tarjeta
  # ============================================
  - type: web
    name: centinela-backend
    runtime: python
    repo: https://github.com/Aixa11/Centinela-Demo
    branch: main
    plan: starter
    # ... el resto igual ...

  # ============================================
  # SERVICIO 2: FRONTEND (Dashboard) - estatico
  # ============================================
  - type: web
    name: centinela-frontend
    runtime: static
    repo: https://github.com/Aixa11/Centinela-Demo
    branch: main
    plan: free               # <--- SOLO EL FRONTEND PUEDE SER FREE
    buildCommand: |
      cd frontend
    staticPublishPath: ./frontend
    envVars:
      - key: API_URL
        value: https://centinela-backend.onrender.com
